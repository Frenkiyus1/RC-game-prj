<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyramid Maze - Join Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a;
  font-family: 'Courier New', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #d4a84b;
}
.container {
  background: rgba(20,15,10,0.95);
  border: 2px solid #8b6914;
  border-radius: 12px;
  padding: 40px 50px;
  width: 400px;
  box-shadow: 0 0 60px rgba(212,168,75,0.15);
}
h1 {
  text-align: center;
  font-size: 22px;
  letter-spacing: 3px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,168,75,0.3);
}
.subtitle {
  text-align: center;
  color: #888;
  font-size: 11px;
  margin-bottom: 30px;
  letter-spacing: 1px;
}
.form-group {
  margin-bottom: 18px;
}
label {
  display: block;
  font-size: 11px;
  color: #888;
  margin-bottom: 5px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
input {
  width: 100%;
  padding: 12px 14px;
  background: #1a1208;
  border: 1px solid #2a1f0e;
  border-radius: 6px;
  color: #d4a84b;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #8b6914; }
input::placeholder { color: #444; }
.btn {
  width: 100%;
  padding: 14px;
  background: #8b6914;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 5px;
}
.btn:hover { background: #d4a84b; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error {
  color: #ff4444;
  font-size: 12px;
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
}
.info {
  color: #888;
  font-size: 11px;
  text-align: center;
  margin-top: 20px;
  line-height: 1.6;
}
.teams-section {
  margin-top: 20px;
  border-top: 1px solid #2a1f0e;
  padding-top: 15px;
}
.teams-section h3 {
  font-size: 12px;
  color: #888;
  letter-spacing: 1px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.team-list {
  max-height: 150px;
  overflow-y: auto;
}
.team-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  font-size: 12px;
  color: #ccc;
  border-bottom: 1px solid #1a1208;
  cursor: pointer;
  transition: background 0.15s;
}
.team-item:hover { background: rgba(139,105,20,0.15); }
.team-item .players { color: #888; font-size: 11px; }
.team-item .gameover { color: #ff4444; font-size: 10px; }
.no-teams { color: #555; font-size: 11px; text-align: center; padding: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>◈ PYRAMID MAZE ◈</h1>
  <div class="subtitle">Curse of the Mummies — Multiplayer</div>

  <div class="form-group">
    <label>Your Name</label>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20" autocomplete="off">
  </div>
  <div class="form-group">
    <label>Team Name</label>
    <input type="text" id="teamInput" placeholder="Enter team name (same = same room)" maxlength="30" autocomplete="off">
  </div>
  <button class="btn" id="playBtn" onclick="joinGame()">JOIN GAME</button>
  <div class="error" id="error"></div>

  <div class="teams-section">
    <h3>Active Teams</h3>
    <div class="team-list" id="teamList">
      <div class="no-teams">Loading...</div>
    </div>
  </div>

  <div class="info">
    ◈ Same team name = same room<br>
    ◈ Max 4 players per team
  </div>
</div>

<script>
const saved = localStorage.getItem('pyramid_name');
if (saved) document.getElementById('nameInput').value = saved;

function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  const team = document.getElementById('teamInput').value.trim();
  const errEl = document.getElementById('error');
  errEl.textContent = '';

  if (!name) { errEl.textContent = 'Please enter your name.'; return; }
  if (!team) { errEl.textContent = 'Please enter a team name.'; return; }
  if (name.length < 1) { errEl.textContent = 'Name must be at least 1 character.'; return; }
  if (team.length < 1) { errEl.textContent = 'Team name must be at least 1 character.'; return; }

  localStorage.setItem('pyramid_name', name);
  localStorage.setItem('pyramid_team', team);
  window.location.href = '/game.html';
}

document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
document.getElementById('teamInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

async function loadTeams() {
  try {
    const res = await fetch('/api/teams');
    const data = await res.json();
    const list = document.getElementById('teamList');
    if (data.teams.length === 0) {
      list.innerHTML = '<div class="no-teams">No active teams yet</div>';
      return;
    }
    list.innerHTML = data.teams.map(t =>
      `<div class="team-item" onclick="pickTeam('${t.name.replace(/'/g, "\\'")}')">` +
      `<span>${t.name}</span>` +
      `<span>${t.gameOver ? '<span class="gameover">Game Over</span>' : `<span class="players">${t.players}/${t.maxPlayers}</span>`}</span>` +
      `</div>`
    ).join('');
  } catch(e) {
    document.getElementById('teamList').innerHTML = '<div class="no-teams">Cannot load teams</div>';
  }
}

function pickTeam(name) {
  document.getElementById('teamInput').value = name;
}

loadTeams();
setInterval(loadTeams, 5000);
</script>
</body>
</html>
