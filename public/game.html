<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyramid Maze - Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a; font-family: 'Courier New', monospace;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; color: #d4a84b; overflow: hidden;
}
#titleBar {
  width:100%; padding:6px 20px;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(20,15,10,0.95); border-bottom:1px solid #2a1f0e;
  font-size:12px;
}
#titleBar .left { color:#888; }
#titleBar .right { text-align:right; }
#gameContainer { position:relative; margin-top:2px; }
canvas { border:3px solid #8b6914; box-shadow:0 0 30px rgba(212,168,75,0.3); display:block; }
#hud {
  position:absolute; top:8px; right:8px; z-index:10; text-align:right;
  max-height:90%; overflow-y:auto; pointer-events:none;
}
.hud-item {
  background:rgba(0,0,0,0.85); border:1px solid #8b6914;
  padding:4px 10px; margin-bottom:3px; border-radius:4px;
  font-size:11px; white-space:nowrap;
}
.hud-item.self { border-color:#ffd700; box-shadow:0 0 8px rgba(255,215,0,0.2); }
.hud-item .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
#message {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:20; background:rgba(0,0,0,0.92); border:2px solid #d4a84b;
  padding:30px 50px; text-align:center; border-radius:8px; display:none;
  min-width:300px;
}
#message h2 { font-size:24px; margin-bottom:10px; color:#ffd700; }
#message p { font-size:14px; margin-bottom:15px; color:#ccc; }
#message button {
  background:#8b6914; color:white; border:none; padding:10px 25px;
  font-family:'Courier New',monospace; font-size:14px; cursor:pointer; border-radius:4px;
  margin:3px; transition:background 0.2s;
}
#message button:hover { background:#d4a84b; }
#lobby {
  position:absolute; top:0; left:0; right:0; bottom:0;
  z-index:30; background:rgba(0,0,0,0.92); border:2px solid #8b6914;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#lobby h2 { font-size:20px; letter-spacing:2px; margin-bottom:20px; }
#lobby .count { font-size:40px; color:#ffd700; margin-bottom:5px; }
#lobby .label { color:#888; font-size:12px; margin-bottom:25px; }
#lobby .players-list { max-height:200px; overflow-y:auto; width:280px; margin-bottom:20px; }
#lobby .players-list div { padding:4px 10px; font-size:12px; color:#ccc; border-bottom:1px solid #1a1208; }
#lobby .waiting { color:#666; font-size:11px; animation:pulseText 1.5s infinite; }
@keyframes pulseText { 0%,100%{opacity:0.4} 50%{opacity:1} }
#chatBox {
  position:absolute; bottom:8px; left:8px; z-index:10; width:280px;
  pointer-events:none;
}
#chatMsgs {
  background:rgba(0,0,0,0.8); border:1px solid #2a1f0e; border-radius:4px;
  padding:6px 8px; max-height:100px; overflow-y:auto; font-size:10px; color:#aaa;
  margin-bottom:4px; display:none;
}
#chatInput {
  width:100%; padding:6px 8px; background:#1a1208; border:1px solid #2a1f0e;
  border-radius:4px; color:#d4a84b; font-family:'Courier New',monospace;
  font-size:11px; outline:none; display:none; pointer-events:auto;
}
#chatInput:focus { border-color:#8b6914; }
#controls {
  position:absolute; bottom:8px; right:8px; z-index:10;
  background:rgba(0,0,0,0.8); border:1px solid #2a1f0e; border-radius:4px;
  padding:8px 12px; font-size:10px; color:#666; text-align:center;
}
#controls .key { background:#2a1f0e; border:1px solid #555; padding:1px 5px; border-radius:3px; }
#controls .passkey { color:#ffd700; }
</style>
</head>
<body>
<div id="titleBar">
  <div class="left">◈ PYRAMID MAZE <span id="roomInfo"></span></div>
  <div class="right"><span id="playerCount">0</span> explorers &nbsp;|&nbsp; <span id="myName"></span> <span id="colorDot" style="display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;"></span></div>
</div>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="hud"></div>
  <div id="lobby">
    <h2>◈ WAITING FOR EXPLORERS ◈</h2>
    <div class="count" id="lobbyCount">0</div>
    <div class="label">players in your game</div>
    <div class="players-list" id="lobbyPlayers"></div>
    <div class="waiting" id="lobbyStatus">Waiting for more adventurers...</div>
  </div>
  <div id="message">
    <h2 id="msgTitle"></h2>
    <p id="msgText"></p>
    <button id="msgBtn" onclick="location.reload()">PLAY AGAIN</button>
    <button onclick="window.location.href='/login.html'">LEAVE TEAM</button>
  </div>
  <div id="chatBox">
    <div id="chatMsgs"></div>
    <input id="chatInput" placeholder="Chat (Enter to send)" maxlength="100">
  </div>
  <div id="controls">
    <span class="key">W A S D</span> Move &nbsp;
    <span class="key passkey">E</span> Pass Ball &nbsp;
    <span class="key">Enter</span> Chat
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const TILE = 32, COLS = 35, ROWS = 25;
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

const playerName = localStorage.getItem('pyramid_name');
const teamName = localStorage.getItem('pyramid_team');
if (!playerName || !teamName) { window.location.href = '/login.html'; }

document.getElementById('myName').textContent = playerName || 'Player';

let ws = null;
let gameState = {
  maze: [], players: [], mummies: [], ball: null,
  lionStatue: null, doorOpen: false, doorX: 0, doorY: 0,
  key: null, gameOver: false, myId: null, gameStarted: false
};
let keys = {};
let connected = false;
let frameCount = 0;

function connect() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${window.location.host}/?name=${encodeURIComponent(playerName)}&team=${encodeURIComponent(teamName)}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    connected = true;
    document.getElementById('lobbyStatus').textContent = 'Connected! Waiting for others...';
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    connected = false;
    if (!gameState.gameOver) {
      showMessage('Disconnected', 'Connection to server lost. Trying to reconnect...');
      setTimeout(connect, 2000);
    }
  };

  ws.onerror = () => {};
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'joined':
      gameState.myId = msg.playerId;
      gameState.maze = msg.maze;
      gameState.ball = msg.ball;
      gameState.lionStatue = msg.lionStatue;
      gameState.doorOpen = msg.doorOpen;
      gameState.doorX = msg.doorX;
      gameState.doorY = msg.doorY;
      gameState.key = msg.key;
      gameState.mummies = msg.mummies;
      gameState.players = msg.players;
      gameState.gameStarted = msg.gameStarted;
      updateLobby();
      document.getElementById('roomInfo').textContent = `| Team: ${msg.team}`;
      document.getElementById('colorDot').style.backgroundColor = 
        (msg.players.find(p => p.id === msg.playerId) || {}).color || '#888';
      break;

    case 'player_joined':
      gameState.players.push({ id: msg.id, x: msg.x, y: msg.y, color: msg.color, name: msg.name, hasBall: false });
      updateLobby();
      updateHUD();
      break;

    case 'player_left':
      gameState.players = gameState.players.filter(p => p.id !== msg.id);
      if (gameState.players.length < 2 && document.getElementById('lobby').style.display !== 'none') {
        updateLobby();
      }
      updateHUD();
      break;

    case 'state_update':
      for (const sp of msg.players) {
        const p = gameState.players.find(pl => pl.id === sp.id);
        if (p) { p.x = sp.x; p.y = sp.y; p.hasBall = sp.hasBall; }
      }
      for (const sm of msg.mummies) {
        const m = gameState.mummies.find(mu => mu.x !== undefined);
        if (msg.mummies.indexOf(sm) < gameState.mummies.length) {
          gameState.mummies[msg.mummies.indexOf(sm)] = sm;
        }
      }
      if (msg.ball) gameState.ball = msg.ball;
      break;

    case 'ball_spawned':
      gameState.ball.active = true;
      gameState.ball.x = msg.x;
      gameState.ball.y = msg.y;
      break;

    case 'ball_picked':
      gameState.ball.carried = true;
      gameState.ball.carrier = msg.playerId;
      const carrier = gameState.players.find(p => p.id === msg.playerId);
      if (carrier) carrier.hasBall = true;
      break;

    case 'ball_passed':
      const from = gameState.players.find(p => p.id === msg.from);
      const to = gameState.players.find(p => p.id === msg.to);
      if (from) from.hasBall = false;
      if (to) to.hasBall = true;
      gameState.ball.carrier = msg.to;
      gameState.ball.carried = true;
      break;

    case 'statue_activated':
      gameState.lionStatue.absorbed = true;
      gameState.doorOpen = true;
      gameState.key.visible = true;
      if (msg.doorX !== undefined) { gameState.doorX = msg.doorX; gameState.doorY = msg.doorY; }
      if (msg.keyX !== undefined) { gameState.key.x = msg.keyX; gameState.key.y = msg.keyY; }
      break;

    case 'game_over':
      gameState.gameOver = true;
      showMessage('Game Over', msg.reason || 'The mummies got you!');
      break;

    case 'game_win':
      gameState.gameOver = true;
      if (msg.playerId === gameState.myId) {
        showMessage('🎉 Victory!', 'You found the Golden Key! The treasure is yours!');
      } else {
        showMessage(`${msg.playerName} found the Key!`, `${msg.playerName} has claimed the treasure!`);
      }
      break;

    case 'game_started':
      gameState.gameStarted = true;
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('chatMsgs').style.display = 'block';
      document.getElementById('chatInput').style.display = 'block';
      break;

    case 'game_reset':
      gameState.gameOver = false;
      gameState.gameStarted = false;
      document.getElementById('message').style.display = 'none';
      document.getElementById('lobby').style.display = 'flex';
      document.getElementById('lobbyStatus').textContent = 'Game reset by admin. Waiting to start...';
      break;

    case 'chat':
      addChatMessage(msg.from, msg.message);
      break;

    case 'error':
      showMessage('Error', msg.message);
      break;
  }
}

function sendInput(dir) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'input', dir }));
  }
}

function sendPass() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'pass_ball' }));
  }
}

function sendChat(message) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', message }));
  }
}

function updateLobby() {
  const count = gameState.players.length;
  document.getElementById('lobbyCount').textContent = count;

  const list = document.getElementById('lobbyPlayers');
  list.innerHTML = gameState.players.map(p =>
    `<div><span style="color:${p.color}">●</span> ${p.name}${p.id === gameState.myId ? ' (you)' : ''}</div>`
  ).join('');

  document.getElementById('playerCount').textContent = count;

  if (gameState.gameStarted) {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('chatMsgs').style.display = 'block';
    document.getElementById('chatInput').style.display = 'block';
  } else {
    document.getElementById('lobby').style.display = 'flex';
    document.getElementById('lobbyStatus').textContent = 'Waiting for admin to start the game...';
  }
}

function showMessage(title, text) {
  document.getElementById('msgTitle').textContent = title;
  document.getElementById('msgText').textContent = text;
  document.getElementById('message').style.display = 'block';
}

function addChatMessage(from, message) {
  const el = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.textContent = `${from}: ${message}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function updateHUD() {
  const hud = document.getElementById('hud');
  let html = '';
  for (const p of gameState.players) {
    const isMe = p.id === gameState.myId;
    html += `<div class="hud-item${isMe ? ' self' : ''}">` +
      `<span class="dot" style="background:${p.color}"></span>` +
      `${p.name}${isMe ? ' (you)' : ''}` +
      (p.hasBall ? ' <span style="color:#ffd700">◈</span>' : '') +
      `</div>`;
  }
  if (gameState.ball) {
    html += `<div class="hud-item" style="font-size:10px;color:#888">` +
      `Ball: ${gameState.ball.carried && gameState.ball.carrier ? 
        `<span style="color:#ffd700">Carried</span>` : 
        `<span style="color:#888">Free</span>`}` +
      `</div>`;
  }
  if (gameState.key) {
    html += `<div class="hud-item" style="font-size:10px;color:#888">` +
      `Key: ${gameState.key.collected ? '<span style="color:#44ff44">Found!</span>' : 
        gameState.key.visible ? '<span style="color:#ffd700">Visible</span>' : '<span style="color:#888">Hidden</span>'}` +
      `</div>`;
  }
  hud.innerHTML = html;
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','a','A','s','S','d','D'].includes(e.key)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','a','A','s','S','d','D'].includes(e.key)) {
    e.preventDefault();
  }
});

const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const text = chatInput.value.trim();
    if (text) { sendChat(text); chatInput.value = ''; }
    chatInput.blur();
    e.preventDefault();
  }
  if (e.key === 'Escape') { chatInput.blur(); e.preventDefault(); }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement !== chatInput) {
    if (document.getElementById('chatInput').style.display !== 'none') {
      chatInput.focus();
      e.preventDefault();
    }
  }
  if ((e.key === 'e' || e.key === 'E') && document.activeElement !== chatInput) {
    sendPass();
  }
});

function getInputDir() {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['W']) dy = -1;
  if (keys['s'] || keys['S']) dy = 1;
  if (keys['a'] || keys['A']) dx = -1;
  if (keys['d'] || keys['D']) dx = 1;
  if (keys['ArrowUp']) dy = -1;
  if (keys['ArrowDown']) dy = 1;
  if (keys['ArrowLeft']) dx = -1;
  if (keys['ArrowRight']) dx = 1;
  if (dx !== 0 && dy !== 0) {
    const len = Math.sqrt(dx*dx + dy*dy);
    dx /= len; dy /= len;
  }
  if (dx === 0 && dy === 0) return null;
  return [dx, dy];
}

let lastSentDir = null;

function sendInputLoop() {
  const dir = getInputDir();
  const dirStr = dir ? JSON.stringify(dir) : null;
  const lastStr = lastSentDir ? JSON.stringify(lastSentDir) : null;
  if (dirStr !== lastStr) {
    sendInput(dir);
    lastSentDir = dir;
  }
  setTimeout(sendInputLoop, 50);
}

function drawMaze() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (gameState.maze[y] && gameState.maze[y][x] === 1) {
        ctx.fillStyle = '#2a1f0e';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        ctx.fillStyle = '#1a1208';
        ctx.fillRect(x * TILE + 2, y * TILE + 2, TILE - 4, TILE - 4);
      } else {
        ctx.fillStyle = '#0d0d0d';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }
}

function drawPlayers() {
  for (const p of gameState.players) {
    const isMe = p.id === gameState.myId;
    const pulse = Math.sin(frameCount * 0.05 + (p.name ? p.name.charCodeAt(0) : 0)) * 1.5;

    ctx.beginPath();
    ctx.arc(p.x + TILE/2, p.y + TILE/2, TILE/2 - 2 + pulse, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = p.hasBall ? '#ffd700' : (isMe ? '#ffffff' : '#555');
    ctx.lineWidth = p.hasBall ? 2.5 : (isMe ? 2 : 1);
    ctx.stroke();

    if (p.hasBall) {
      ctx.beginPath();
      ctx.arc(p.x + TILE/2, p.y + TILE/2, TILE/2 + 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,215,0,0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    if (isMe) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Courier New';
    } else {
      ctx.fillStyle = '#aaa';
      ctx.font = '10px Courier New';
    }
    ctx.textAlign = 'center';
    ctx.fillText(p.name + (isMe ? ' (you)' : ''), p.x + TILE/2, p.y - 4);
  }
}

function drawMummies() {
  for (const m of gameState.mummies) {
    if (m.state === 'chase') {
      const flash = Math.sin(frameCount * 0.2) > 0;
      if (flash) {
        ctx.fillStyle = 'rgba(255,0,0,0.15)';
        ctx.fillRect(m.x - 2, m.y - 2, TILE + 4, TILE + 4);
      }
    }
    ctx.fillStyle = m.state === 'chase' ? '#8b0000' : '#556b2f';
    ctx.fillRect(m.x + 2, m.y + 2, TILE - 4, TILE - 4);
    ctx.fillStyle = m.state === 'chase' ? '#ff0000' : '#ffff00';
    ctx.beginPath();
    ctx.arc(m.x + TILE/2 - 5, m.y + TILE/2 - 3, 3, 0, Math.PI * 2);
    ctx.arc(m.x + TILE/2 + 5, m.y + TILE/2 - 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d2b48c';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const ly = m.y + 8 + i * 7;
      ctx.beginPath();
      ctx.moveTo(m.x + 5, ly);
      ctx.lineTo(m.x + TILE - 5, ly);
      ctx.stroke();
    }
    if (m.state === 'chase') {
      ctx.fillStyle = '#ff0000';
      ctx.font = '12px serif';
      ctx.textAlign = 'center';
      ctx.fillText('!', m.x + TILE/2, m.y - 5);
    }
  }
}

function drawBall() {
  if (!gameState.ball || gameState.ball.carried || !gameState.ball.active) return;
  const b = gameState.ball;
  const glow = Math.sin(frameCount * 0.1) * 3 + TILE/2;
  const gradient = ctx.createRadialGradient(b.x + TILE/2, b.y + TILE/2, 2, b.x + TILE/2, b.y + TILE/2, glow);
  gradient.addColorStop(0, '#ffd700');
  gradient.addColorStop(0.5, '#daa520');
  gradient.addColorStop(1, 'rgba(218,165,32,0)');
  ctx.beginPath();
  ctx.arc(b.x + TILE/2, b.y + TILE/2, glow, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(b.x + TILE/2, b.y + TILE/2, TILE/3, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd700';
  ctx.fill();
  ctx.strokeStyle = '#b8860b';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawLionStatue() {
  if (!gameState.lionStatue) return;
  const s = gameState.lionStatue;
  const x = s.x + TILE/2, y = s.y + TILE/2;
  if (s.absorbed) {
    const glow2 = Math.sin(frameCount * 0.05) * 5 + 15;
    const gradient = ctx.createRadialGradient(x, y, 5, x, y, glow2 + 10);
    gradient.addColorStop(0, 'rgba(255,215,0,0.4)');
    gradient.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(x - 25, y - 25, 50, 50);
  }
  ctx.fillStyle = '#8b7355';
  ctx.beginPath();
  ctx.arc(x, y, TILE/2 + 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a84b';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#d4a84b';
  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🦁', x, y);
}

function drawKey() {
  if (!gameState.key || !gameState.key.visible || gameState.key.collected) return;
  const k = gameState.key;
  const glow = Math.sin(frameCount * 0.08) * 3 + 10;
  const gradient = ctx.createRadialGradient(k.x + TILE/2, k.y + TILE/2, 3, k.x + TILE/2, k.y + TILE/2, glow);
  gradient.addColorStop(0, 'rgba(0,255,100,0.5)');
  gradient.addColorStop(1, 'rgba(0,255,100,0)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(k.x + TILE/2, k.y + TILE/2, glow, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#44ff44';
  ctx.font = '18px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🗝️', k.x + TILE/2, k.y + TILE/2);
}

function drawDoor() {
  if (!gameState.doorOpen) return;
  ctx.fillStyle = 'rgba(255,215,0,0.15)';
  ctx.fillRect(gameState.doorX, gameState.doorY, TILE, TILE);
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 2;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(gameState.doorX, gameState.doorY, TILE, TILE);
  ctx.setLineDash([]);
  ctx.fillStyle = '#ffd700';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('Open', gameState.doorX + TILE/2, gameState.doorY + TILE/2 + 3);
}

function darkOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function gameLoop() {
  frameCount++;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMaze();

  for (const p of gameState.players) {
    if (p.x !== undefined && p.y !== undefined) {
      const gradient = ctx.createRadialGradient(
        p.x + TILE/2, p.y + TILE/2, TILE * 0.5,
        p.x + TILE/2, p.y + TILE/2, TILE * 3.5
      );
      gradient.addColorStop(0, 'rgba(255,200,50,0.12)');
      gradient.addColorStop(0.5, 'rgba(255,150,30,0.06)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(p.x - TILE * 3, p.y - TILE * 3, TILE * 8, TILE * 8);
    }
  }

  drawDoor();
  drawLionStatue();
  drawKey();
  drawBall();
  drawMummies();
  drawPlayers();
  darkOverlay();
  updateHUD();

  requestAnimationFrame(gameLoop);
}

connect();
sendInputLoop();
gameLoop();
</script>
</body>
</html>
